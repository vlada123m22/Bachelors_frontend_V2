<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teammy – Collaborative Project Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #4361ee; --secondary: #3f37c9; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%); font-family: 'Segoe UI', sans-serif; }
        .hero { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; padding: 100px 0; border-radius: 0 0 30px 30px; margin-bottom: 40px; }
        .logo { font-size: 2.5rem; font-weight: bold; }
        .feature-card { background: white; border-radius: 20px; padding: 30px; text-align: center; transition: 0.3s; height: 100%; }
        .feature-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.12); }
        .feature-icon { font-size: 3rem; color: var(--primary); margin-bottom: 20px; }
        .btn-primary-custom { background: var(--primary); border-radius: 50px; padding: 12px 30px; }
        .navbar { background: rgba(255,255,255,0.95) !important; backdrop-filter: blur(10px); }
        .project-card, .team-card { cursor: pointer; transition: 0.2s; border-radius: 15px; }
        .project-card:hover, .team-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        footer { background: #212529; color: white; padding: 30px 0; margin-top: 60px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand" href="#" onclick="navigateTo('home')">
            <i class="fas fa-users"></i> Teammy
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto" id="nav-links"></ul>
            <ul class="navbar-nav">
                <li class="nav-item"><span class="nav-link" id="user-name-display"></span></li>
                <li class="nav-item"><button class="btn btn-outline-danger btn-sm" onclick="logout()" id="logout-btn" style="display:none;">Logout</button></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5 pt-4" id="app-content">
    <div class="text-center loading">Loading...</div>
</div>

<footer><div class="container text-center"><p>&copy; 2026 Teammy – Build better teams, together.</p></div></footer>

<script>
    // ---------- API (proxied via /api) ----------
    const API_BASE = '/api';
    let token = localStorage.getItem('token');
    let currentUser = null;

    function getHeaders(contentType = true) {
        const headers = {};
        if (token) headers['Authorization'] = `Bearer ${token}`;
        if (contentType) headers['Content-Type'] = 'application/json';
        return headers;
    }

    async function apiCall(url, options = {}) {
        const response = await fetch(`${API_BASE}${url}`, {
            ...options,
            headers: { ...getHeaders(options.contentType !== false), ...options.headers }
        });
        if (response.status === 401 && token) { logout(); throw new Error('Session expired'); }
        return response;
    }

    // ---------- Auth ----------
    function setAuth(data) {
        if (data.Token) {
            token = data.Token;
            localStorage.setItem('token', token);
            const decoded = JSON.parse(atob(token.split('.')[1]));
            currentUser = { username: decoded.sub, roles: decoded.roles || [] };
            updateNav();
            navigateTo('home');
        }
    }

    async function fetchCurrentUser() {
        try {
            await apiCall('/auth/test');
            const decoded = JSON.parse(atob(token.split('.')[1]));
            currentUser = { username: decoded.sub, roles: decoded.roles || [] };
            updateNav();
            navigateTo('home');
        } catch(e) { logout(); }
    }

    function logout() {
        localStorage.removeItem('token');
        token = null;
        currentUser = null;
        updateNav();
        navigateTo('landing');
    }

    function updateNav() {
        const navLinks = document.getElementById('nav-links');
        const userNameSpan = document.getElementById('user-name-display');
        const logoutBtn = document.getElementById('logout-btn');
        if (!currentUser) {
            navLinks.innerHTML = '';
            userNameSpan.innerText = '';
            logoutBtn.style.display = 'none';
            return;
        }
        userNameSpan.innerText = `👋 ${currentUser.username}`;
        logoutBtn.style.display = 'inline-block';
        const roles = currentUser.roles.map(r => r.toUpperCase());
        let links = '';
        if (roles.includes('PARTICIPANT')) {
            links += `<li class="nav-item"><a class="nav-link" href="#" onclick="navigateTo('participant-dashboard')">Dashboard</a></li>
                      <li class="nav-item"><a class="nav-link" href="#" onclick="navigateTo('my-applications')">My Apps</a></li>`;
        }
        if (roles.includes('ORGANIZER')) {
            links += `<li class="nav-item"><a class="nav-link" href="#" onclick="navigateTo('organizer-projects')">My Projects</a></li>
                      <li class="nav-item"><a class="nav-link" href="#" onclick="navigateTo('create-project')">Create Project</a></li>`;
        }
        if (roles.includes('ADMIN')) {
            links += `<li class="nav-item"><a class="nav-link" href="#" onclick="navigateTo('admin-panel')">Admin</a></li>`;
        }
        links += `<li class="nav-item"><a class="nav-link" href="#" onclick="navigateTo('change-password')">Change Password</a></li>`;
        navLinks.innerHTML = links;
    }

    // ---------- Landing Page ----------
    function renderLanding() {
        document.getElementById('app-content').innerHTML = `
            <div class="hero">
                <div class="container text-center">
                    <div class="logo mb-3"><i class="fas fa-users fa-3x"></i><h1 class="display-4 fw-bold">Teammy</h1></div>
                    <p class="lead">The smart way to organize hackathons, projects, and team events</p>
                    <button class="btn btn-light btn-lg m-2" onclick="navigateTo('login')">Login</button>
                    <button class="btn btn-outline-light btn-lg m-2" onclick="navigateTo('register')">Sign Up Free</button>
                </div>
            </div>
            <div class="container">
                <div class="row g-4">
                    <div class="col-md-4"><div class="feature-card"><i class="fas fa-users feature-icon"></i><h3>Team Formation</h3><p>Auto‑form balanced teams or let participants create their own.</p></div></div>
                    <div class="col-md-4"><div class="feature-card"><i class="fas fa-file-alt feature-icon"></i><h3>Smart Applications</h3><p>Custom forms, file uploads, and instant selection.</p></div></div>
                    <div class="col-md-4"><div class="feature-card"><i class="fas fa-calendar-alt feature-icon"></i><h3>Schedule Management</h3><p>Publish agendas with visibility controls.</p></div></div>
                </div>
            </div>
        `;
    }

    // ---------- Login (no email) ----------
    function renderLogin() {
        document.getElementById('app-content').innerHTML = `
            <div class="row justify-content-center"><div class="col-md-5"><div class="card shadow">
                <div class="card-header bg-primary text-white">Login to Teammy</div>
                <div class="card-body">
                    <div id="login-error" class="alert alert-danger d-none"></div>
                    <div class="mb-3"><label>Username</label><input id="login-username" class="form-control"></div>
                    <div class="mb-3"><label>Password</label><input id="login-password" type="password" class="form-control"></div>
                    <button class="btn btn-primary w-100" onclick="performLogin()">Login</button>
                    <hr><p class="text-center">Don't have an account? <a href="#" onclick="navigateTo('register')">Sign up</a></p>
                </div>
            </div></div></div>
        `;
    }

    async function performLogin() {
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;
        try {
            const res = await apiCall('/auth/login', {
                method: 'POST',
                body: JSON.stringify({ UserName: username, Password: password })
            });
            const data = await res.json();
            if (data.State === 'Success') setAuth(data);
            else {
                document.getElementById('login-error').innerText = data.ErrorMessage || 'Login failed';
                document.getElementById('login-error').classList.remove('d-none');
            }
        } catch(e) { alert('Login error'); }
    }

    // ---------- Register (NO EMAIL) ----------
    function renderRegister() {
        document.getElementById('app-content').innerHTML = `
            <div class="row justify-content-center"><div class="col-md-6"><div class="card shadow">
                <div class="card-header bg-success text-white">Join Teammy</div>
                <div class="card-body">
                    <div id="reg-error" class="alert alert-danger d-none"></div>
                    <div class="mb-3"><label>Username</label><input id="reg-username" class="form-control"></div>
                    <div class="mb-3"><label>Password</label><input id="reg-password" type="password" class="form-control"></div>
                    <div class="mb-3"><label>I want to join as</label>
                        <select id="reg-role" class="form-select">
                            <option value="participant">Participant</option>
                            <option value="organizer">Organizer</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <button class="btn btn-success w-100" onclick="performRegister()">Sign Up</button>
                </div>
            </div></div></div>
        `;
    }

    async function performRegister() {
        const username = document.getElementById('reg-username').value;
        const password = document.getElementById('reg-password').value;
        const role = document.getElementById('reg-role').value;
        let endpoint = '';
        if (role === 'organizer') endpoint = '/auth/signup/organizer';
        else if (role === 'participant') endpoint = '/auth/signup/participant';
        else endpoint = '/auth/signup/admin';
        try {
            const res = await apiCall(endpoint, {
                method: 'POST',
                body: JSON.stringify({ UserName: username, Password: password }) // No Email field
            });
            if (res.status === 201 || res.status === 200) {
                alert('Registration successful! Please login.');
                navigateTo('login');
            } else {
                const data = await res.json();
                document.getElementById('reg-error').innerText = data.errorMessage || 'Registration failed';
                document.getElementById('reg-error').classList.remove('d-none');
            }
        } catch(e) { alert('Registration error'); }
    }

    // ========== PARTICIPANT DASHBOARD ==========
    async function renderParticipantDashboard() {
        const content = document.getElementById('app-content');
        content.innerHTML = '<div class="loading">Loading future projects...</div>';
        try {
            const res = await apiCall('/projects/dashboard/future');
            const projects = await res.json();
            let html = `<h2>🚀 Upcoming Projects</h2><div class="row">`;
            projects.forEach(p => {
                html += `<div class="col-md-4"><div class="card project-card" onclick="navigateTo('project-view', ${p.projectId})">
                    <div class="card-body"><h5>${escapeHtml(p.projectName)}</h5><p>${escapeHtml(p.projectDescription?.substring(0,100) || '')}</p>
                    <small><i class="fas fa-calendar"></i> ${new Date(p.startDate).toLocaleDateString()}</small></div></div></div>`;
            });
            html += `</div>`;
            content.innerHTML = html;
        } catch(e) { content.innerHTML = '<div class="alert alert-danger">Failed to load projects</div>'; }
    }

    async function renderMyApplications() {
        const content = document.getElementById('app-content');
        content.innerHTML = '<div class="loading">Loading your applications...</div>';
        try {
            const res = await apiCall('/participant/my-applications');
            const apps = await res.json();
            let html = `<h2>📋 My Applications</h2><table class="table table-striped"><thead><tr><th>Project</th><th>Start Date</th><th>Applied</th><th>Accepted</th><th></th></tr></thead><tbody>`;
            apps.forEach(a => {
                html += `<tr><td>${escapeHtml(a.projectName)}</td><td>${new Date(a.startDate).toLocaleDateString()}</td>
                         <td>${a.hasApplied ? '✅' : '❌'}</td><td>${a.isAccepted ? '✅ Accepted' : '⏳ Pending'}</td>
                         <td><button class="btn btn-sm btn-outline-primary" onclick="navigateTo('project-view',${a.projectId})">View</button></td></tr>`;
            });
            html += `</tbody></table>`;
            content.innerHTML = html;
        } catch(e) { content.innerHTML = '<div class="alert alert-danger">Error loading applications</div>'; }
    }

    // ========== ORGANIZER PROJECTS ==========
    async function renderOrganizerProjects() {
        const content = document.getElementById('app-content');
        content.innerHTML = '<div class="loading">Loading your projects...</div>';
        try {
            const res = await apiCall('/projects');
            const projects = await res.json();
            let html = `<h2>📁 My Projects</h2><div class="row">`;
            projects.forEach(p => {
                html += `<div class="col-md-4"><div class="card project-card"><div class="card-body">
                    <h5>${escapeHtml(p.projectName)}</h5><p>${escapeHtml(p.projectDescription?.substring(0,80) || '')}</p>
                    <button class="btn btn-sm btn-outline-primary" onclick="navigateTo('project-view',${p.projectId})">Manage</button>
                    <button class="btn btn-sm btn-outline-secondary" onclick="navigateTo('edit-project',${p.projectId})">Edit</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteProject(${p.projectId})">Delete</button>
                </div></div></div>`;
            });
            html += `</div><button class="btn btn-primary mt-3" onclick="navigateTo('create-project')">+ Create New Project</button>`;
            content.innerHTML = html;
        } catch(e) { content.innerHTML = '<div class="alert alert-danger">Failed to load projects</div>'; }
    }

    async function deleteProject(projectId) {
        if (!confirm('Delete this project permanently?')) return;
        const res = await apiCall(`/projects/${projectId}`, { method: 'DELETE' });
        if (res.ok) navigateTo('organizer-projects');
        else alert('Delete failed');
    }

    // ========== PROJECT VIEW (with schedule) ==========
    async function renderProjectView(projectId) {
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        const content = document.getElementById('app-content');
        content.innerHTML = '<div class="loading">Loading project...</div>';
        try {
            const res = await apiCall(`/projects/${projectId}`, { headers: { 'X-Timezone': tz } });
            const project = await res.json();
            const isOrganizer = currentUser && currentUser.roles.includes('ORGANIZER');
            let actions = '';
            if (isOrganizer) {
                actions = `<div class="mb-3">
                    <button class="btn btn-warning" onclick="navigateTo('edit-project',${projectId})">Edit</button>
                    <button class="btn btn-danger" onclick="deleteProject(${projectId})">Delete</button>
                    <button class="btn btn-info" onclick="navigateTo('project-applicants',${projectId})">Applicants</button>
                    <button class="btn btn-success" onclick="navigateTo('team-management',${projectId})">Manage Teams</button>
                </div>`;
            }
            const canApply = !isOrganizer && currentUser && currentUser.roles.includes('PARTICIPANT');
            let applyBtn = canApply ? `<button class="btn btn-success" onclick="navigateTo('apply-project',${projectId})">Apply Now</button>` : '';
            content.innerHTML = `
                <div class="card"><div class="card-header bg-primary text-white"><h2>${escapeHtml(project.projectName)}</h2></div>
                <div class="card-body">
                    <p>${escapeHtml(project.projectDescription)}</p>
                    <p><i class="fas fa-calendar-alt"></i> ${new Date(project.startDate).toLocaleString()} – ${new Date(project.endDate).toLocaleString()}</p>
                    ${actions} ${applyBtn}
                    <hr><h4>📅 Schedule</h4>
                    <div class="mb-2"><label>Day: </label><select id="daySelect" class="form-select w-auto d-inline-block" onchange="changeScheduleDay(${projectId})">
                        ${[1,2,3,4,5].map(d => `<option value="${d}">Day ${d}</option>`).join('')}
                    </select></div>
                    <div id="schedule-list">Loading...</div>
                </div></div>
            `;
            await changeScheduleDay(projectId);
        } catch(e) { content.innerHTML = '<div class="alert alert-danger">Project not found</div>'; }
    }

    window.changeScheduleDay = async function(projectId) {
        const day = document.getElementById('daySelect')?.value || 1;
        const res = await apiCall(`/projects/${projectId}/schedule/${day}`);
        if (res.ok) {
            const schedule = await res.json();
            let html = `<ul class="list-group">`;
            schedule.forEach(s => {
                html += `<li class="list-group-item"><strong>${escapeHtml(s.activityTitle)}</strong><br>${escapeHtml(s.activityDescription)}<br><small>${new Date(s.startTime).toLocaleTimeString()} - ${new Date(s.endTime).toLocaleTimeString()}</small></li>`;
            });
            html += `</ul>`;
            document.getElementById('schedule-list').innerHTML = html;
        } else {
            document.getElementById('schedule-list').innerHTML = '<p>No schedule for this day</p>';
        }
    };

    // ========== CREATE / EDIT PROJECT (full) ==========
    function renderCreateProject() {
        document.getElementById('app-content').innerHTML = `
            <div class="card"><div class="card-header">Create New Project</div><div class="card-body">
                <form id="project-form">
                    <div class="mb-3"><label>Project Name</label><input class="form-control" name="projectName" required></div>
                    <div class="mb-3"><label>Description</label><textarea class="form-control" name="projectDescription"></textarea></div>
                    <div class="row"><div class="col"><label>Start Date</label><input type="datetime-local" class="form-control" name="startDate"></div>
                    <div class="col"><label>End Date</label><input type="datetime-local" class="form-control" name="endDate"></div></div>
                    <div class="row"><div class="col"><label>Min Participants</label><input type="number" class="form-control" name="minNrParticipants" value="2"></div>
                    <div class="col"><label>Max Participants</label><input type="number" class="form-control" name="maxNrParticipants" value="5"></div></div>
                    <div class="mb-3"><label>Teams pre-formed?</label><select class="form-select" name="teamsPreformed"><option value="true">Yes</option><option value="false">No</option></select></div>
                    <div class="mb-3"><label>Schedule Visibility</label><select class="form-select" name="scheduleVisibility"><option>EVERYBODY</option><option>APPLICANTS</option><option>ACCEPTED_PARTICIPANTS</option></select></div>
                    <div class="mb-3"><label>Role Options (comma separated)</label><input class="form-control" name="roleOptions" placeholder="Developer,Designer,Manager"></div>
                    <div class="mb-3"><label>Background Options (comma separated)</label><input class="form-control" name="backgroundOptions" placeholder="CS,Design,Marketing"></div>
                    <div class="mb-3"><label>Roles Question Text</label><input class="form-control" name="rolesQuestionText"></div>
                    <div class="mb-3"><label>Background Question Text</label><input class="form-control" name="backgroundQuestionText"></div>
                    <h5>Form Questions</h5><div id="questions-container"></div>
                    <button type="button" class="btn btn-secondary btn-sm" onclick="addQuestionField()">+ Add Question</button>
                    <hr><button type="submit" class="btn btn-primary">Create Project</button>
                </form>
            </div></div>
        `;
        addQuestionField();
        document.getElementById('project-form').onsubmit = (e) => { e.preventDefault(); submitProject(); };
    }

    let questionCounter = 0;
    function addQuestionField() {
        const container = document.getElementById('questions-container');
        const idx = ++questionCounter;
        const div = document.createElement('div');
        div.className = 'mb-2 p-2 border';
        div.innerHTML = `
            <input type="number" placeholder="Question number" class="form-control mb-1" name="qNum_${idx}" required>
            <select class="form-select mb-1" name="qType_${idx}"><option>TEXT</option><option>CHECKBOX</option><option>FILE</option></select>
            <input type="text" placeholder="Question text" class="form-control mb-1" name="qText_${idx}" required>
            <input type="text" placeholder="Checkbox options (pipe separated)" class="form-control" name="qOpts_${idx}">
            <button type="button" class="btn btn-danger btn-sm mt-1" onclick="this.parentElement.remove()">Remove</button>
        `;
        container.appendChild(div);
    }

    async function submitProject() {
        const form = document.getElementById('project-form');
        const fd = new FormData(form);
        const project = {
            projectName: fd.get('projectName'),
            projectDescription: fd.get('projectDescription'),
            startDate: fd.get('startDate') ? new Date(fd.get('startDate')).toISOString() : null,
            endDate: fd.get('endDate') ? new Date(fd.get('endDate')).toISOString() : null,
            minNrParticipants: parseInt(fd.get('minNrParticipants')),
            maxNrParticipants: parseInt(fd.get('maxNrParticipants')),
            teamsPreformed: fd.get('teamsPreformed') === 'true',
            scheduleVisibility: fd.get('scheduleVisibility'),
            roleOptions: fd.get('roleOptions')?.split(',').map(s=>s.trim()) || [],
            backgroundOptions: fd.get('backgroundOptions')?.split(',').map(s=>s.trim()) || [],
            rolesQuestionText: fd.get('rolesQuestionText'),
            backgroundQuestionText: fd.get('backgroundQuestionText'),
            formQuestions: []
        };
        for (let i=1; i<=questionCounter; i++) {
            const num = fd.get(`qNum_${i}`);
            if (num) {
                project.formQuestions.push({
                    questionNumber: parseInt(num),
                    questionType: fd.get(`qType_${i}`),
                    question: fd.get(`qText_${i}`),
                    checkboxOptions: fd.get(`qOpts_${i}`) || null
                });
            }
        }
        const res = await apiCall('/projects', { method: 'POST', body: JSON.stringify(project) });
        const data = await res.json();
        if (data.status === 'Success') { alert('Project created!'); navigateTo('organizer-projects'); }
        else alert(data.message);
    }

    async function renderEditProject(projectId) {
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        const res = await apiCall(`/projects/${projectId}`, { headers: { 'X-Timezone': tz } });
        const proj = await res.json();
        alert(`Edit mode: implement pre-filled form similar to create. Project: ${proj.projectName}`);
        navigateTo('organizer-projects');
    }

    // ========== APPLICANTS (individual & bulk selection) ==========
    async function renderProjectApplicants(projectId) {
        const content = document.getElementById('app-content');
        content.innerHTML = '<div class="loading">Loading applicants...</div>';
        try {
            const res = await apiCall(`/${projectId}/participants`);
            const data = await res.json();
            let html = `<h2>Applicants</h2>
            <div class="mb-2"><button class="btn btn-primary" onclick="bulkSelect(${projectId}, true)">Accept Selected</button>
            <button class="btn btn-danger" onclick="bulkSelect(${projectId}, false)">Reject Selected</button>
            <button class="btn btn-secondary ms-2" onclick="createTeams(${projectId})">Auto-Form Teams</button></div>
            <table class="table table-bordered"><thead><tr><th><input type="checkbox" id="selectAllCheckbox"></th><th>Name</th><th>Team</th><th>Status</th><th>Action</th></tr></thead><tbody>`;
            const all = [...(data.participantsWithTeam||[]), ...(data.participantsWithoutTeams||[])];
            all.forEach(p => {
                html += `<tr><td><input type="checkbox" class="applicant-checkbox" value="${p.applicantId}"></td>
                         <td>${escapeHtml(p.firstName)} ${escapeHtml(p.lastName)}</td>
                         <td>${p.teamName || 'No team'}</td>
                         <td>${p.isSelected ? 'Accepted' : 'Pending'}</td>
                         <td><button class="btn btn-sm btn-outline-success" onclick="toggleSelection(${projectId}, ${p.applicantId}, ${!p.isSelected})">${p.isSelected ? 'Reject' : 'Accept'}</button></td></tr>`;
            });
            html += `</tbody></table>`;
            content.innerHTML = html;
            document.getElementById('selectAllCheckbox').onclick = (e) => {
                document.querySelectorAll('.applicant-checkbox').forEach(cb => cb.checked = e.target.checked);
            };
        } catch(e) { content.innerHTML = '<div class="alert alert-danger">Cannot load applicants</div>'; }
    }

    async function toggleSelection(projectId, applicantId, select) {
        await apiCall(`/${projectId}/applicants/${applicantId}/selection`, {
            method: 'PATCH',
            body: JSON.stringify({ selected: select })
        });
        renderProjectApplicants(projectId);
    }

    async function bulkSelect(projectId, select) {
        const selectedIds = Array.from(document.querySelectorAll('.applicant-checkbox:checked')).map(cb => parseInt(cb.value));
        if (selectedIds.length === 0) return alert('Select at least one applicant');
        await apiCall(`/${projectId}/applicants/selection`, {
            method: 'PATCH',
            body: JSON.stringify({ applicantIds: selectedIds, selected: select })
        });
        renderProjectApplicants(projectId);
    }

    async function createTeams(projectId) {
        await apiCall(`/${projectId}/create-teams`, { method: 'POST' });
        alert('Teams formed!');
        renderProjectApplicants(projectId);
    }

    // ========== APPLY TO PROJECT (full, with teammates & file upload) ==========
    async function renderApplyProject(projectId) {
        const content = document.getElementById('app-content');
        content.innerHTML = '<div class="loading">Loading application form...</div>';
        try {
            const formRes = await apiCall(`/projects/apply/${projectId}`);
            const formData = await formRes.json();
            let html = `<h2>Apply to Project</h2><form id="applyForm" enctype="multipart/form-data">
                <div class="mb-3"><label>First Name</label><input name="firstName" class="form-control" required></div>
                <div class="mb-3"><label>Last Name</label><input name="lastName" class="form-control" required></div>
                <div class="mb-3"><label>Roles (select allowed)</label><select name="roles" multiple class="form-select">${formData.roleOptions.map(r=>`<option>${r}</option>`).join('')}</select></div>
                <div class="mb-3"><label>Backgrounds</label><select name="background" multiple class="form-select">${formData.backgroundOptions.map(b=>`<option>${b}</option>`).join('')}</select></div>
                <div class="mb-3"><label>Team Name (if joining existing)</label><input name="teamName" class="form-control"></div>
                <div class="mb-3"><label>Join existent team?</label><select name="joinExistentTeam" class="form-select"><option value="true">Yes</option><option value="false">No</option></select></div>
                <div class="mb-3"><label>Teammates (optional, one per line: First Last)</label><textarea name="teammates" class="form-control" placeholder="John Doe&#10;Jane Smith"></textarea></div>`;
            formData.formQuestions.forEach(q => {
                html += `<div class="mb-3"><label>${escapeHtml(q.question)}</label>`;
                if (q.questionType === 'TEXT') {
                    html += `<textarea name="q_${q.questionNumber}" class="form-control" required></textarea>`;
                } else if (q.questionType === 'CHECKBOX') {
                    const opts = q.checkboxOptions?.split('|') || [];
                    opts.forEach(opt => {
                        html += `<div class="form-check"><input class="form-check-input" type="checkbox" name="q_${q.questionNumber}" value="${opt}"> <label>${opt}</label></div>`;
                    });
                } else if (q.questionType === 'FILE') {
                    html += `<input type="file" name="file_${q.questionNumber}" class="form-control" accept=".pdf,.zip,.docx">`;
                }
                html += `</div>`;
            });
            html += `<button type="submit" class="btn btn-primary">Submit Application</button></form>`;
            content.innerHTML = html;
            document.getElementById('applyForm').onsubmit = async (e) => {
                e.preventDefault();
                const formElem = e.target;
                const formBody = new FormData(formElem);
                const answers = [];
                for (let q of formData.formQuestions) {
                    let answer = '';
                    if (q.questionType === 'TEXT') answer = formBody.get(`q_${q.questionNumber}`);
                    else if (q.questionType === 'CHECKBOX') answer = Array.from(formBody.getAll(`q_${q.questionNumber}`)).join('|');
                    else answer = '';
                    answers.push({
                        questionNumber: q.questionNumber,
                        questionType: q.questionType,
                        question: q.question,
                        answer: answer
                    });
                }
                const teammates = (formBody.get('teammates') || '').split('\n').filter(l => l.trim()).map(l => {
                    const parts = l.trim().split(' ');
                    return { firstName: parts[0], lastName: parts.slice(1).join(' ') };
                });
                const applicationPayload = {
                    projectId: projectId,
                    firstName: formBody.get('firstName'),
                    lastName: formBody.get('lastName'),
                    roles: formBody.getAll('roles'),
                    background: formBody.getAll('background'),
                    teamName: formBody.get('teamName') || null,
                    joinExistentTeam: formBody.get('joinExistentTeam') === 'true',
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    questionsAnswers: answers,
                    teammates: teammates
                };
                const finalForm = new FormData();
                finalForm.append('applicationData', JSON.stringify(applicationPayload));
                for (let q of formData.formQuestions) {
                    if (q.questionType === 'FILE') {
                        const file = formBody.get(`file_${q.questionNumber}`);
                        if (file && file.size) finalForm.append(`file_${q.questionNumber}`, file);
                    }
                }
                const res = await apiCall('/projects/apply', { method: 'POST', body: finalForm });
                const result = await res.json();
                alert(result.message);
                if (result.status === 'Success') navigateTo('participant-dashboard');
            };
        } catch(e) { content.innerHTML = '<div class="alert alert-danger">Error loading form</div>'; }
    }

    async function changePassword() {
        const oldPass = document.getElementById('oldPass').value;
        const newPass = document.getElementById('newPass').value;
        const res = await apiCall(`/auth/change-password/${currentUser.username}`, {
            method: 'POST',
            body: JSON.stringify({ oldPassword: oldPass, newPassword: newPass })
        });
        if (res.ok) alert('Password changed');
        else alert('Failed');
    }

    async function deleteProfile() {
        if (!confirm('Delete your account permanently? All your data will be removed.')) return;
        const res = await apiCall(`/auth/delete-profile/${currentUser.username}`, { method: 'DELETE' });

    // ---------- Helper ----------
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // ---------- Routing ----------
    function navigateTo(page, param = null) {
        if (!currentUser && !['landing', 'login', 'register', 'project-view'].includes(page)) page = 'landing';
        switch(page) {
            case 'landing': renderLanding(); break;
            case 'login': renderLogin(); break;
            case 'register': renderRegister(); break;
            case 'participant-dashboard': renderParticipantDashboard(); break;
            case 'my-applications': renderMyApplications(); break;
            case 'organizer-projects': renderOrganizerProjects(); break;
            case 'create-project': renderCreateProject(); break;
            case 'edit-project': renderEditProject(param); break;
            case 'project-view': renderProjectView(param); break;
            case 'apply-project': renderApplyProject(param); break;
            case 'project-applicants': renderProjectApplicants(param); break;
            case 'team-management': renderTeamManagement(param); break;
            case 'change-password': renderChangePassword(); break;
            case 'delete-profile': deleteProfile(); break;
            case 'admin-panel': renderAdminPanel(); break;
            default: renderLanding();
        }
    }

    // Initialization
    if (token) fetchCurrentUser(); else navigateTo('landing');
